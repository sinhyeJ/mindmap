function renderMapTabs(){
  const bar = document.getElementById('map-tab-bar');
  [...bar.querySelectorAll('.map-tab,.folder-tab')].forEach(t=>t.remove());
  document.getElementById('tab-ctx-menu')?.remove();
  const addBtn = bar.querySelector('.map-tab-add');

  // 폴더에 속한 mapId 목록
  const folderedIds = new Set(folders.flatMap(f=>f.mapIds));

  // 렌더 순서: maps 순서 기준으로 폴더/단독탭 배치
  // 폴더는 첫 mapId 위치에 삽입
  const rendered = new Set();

  maps.forEach(m => {
    // 이 맵이 속한 폴더 찾기
    const folder = folders.find(f=>f.mapIds.includes(m.id));

    if(folder && !rendered.has('f'+folder.id)){
      rendered.add('f'+folder.id);
      // 폴더 탭 렌더
      const ftab = document.createElement('div');
      ftab.className = 'folder-tab' + (openFolderId===folder.id?' open':'');
      ftab.dataset.folderId = folder.id;
      const isActive = folder.mapIds.includes(activeMapId);
      const folderColor = folder.color || '#f0c040';
      ftab.style.color = folderColor;
      ftab.style.borderTopColor = folderColor;
      ftab.style.background = `${folderColor}18`;
      ftab.innerHTML = `<svg width="16" height="14" viewBox="0 0 16 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><path d="M1 2.5C1 1.67 1.67 1 2.5 1H6L7.5 3H13.5C14.33 3 15 3.67 15 4.5V11.5C15 12.33 14.33 13 13.5 13H2.5C1.67 13 1 12.33 1 11.5V2.5Z" fill="${folderColor}" fill-opacity="0.85" stroke="${folderColor}" stroke-width="1"/></svg><span class="tab-name">${folder.name}</span> <span style="font-size:10px;opacity:0.7">${openFolderId===folder.id?'▼':'▲'}</span>`;

      ftab.addEventListener('click', e=>{
        e.stopPropagation();
        if(openFolderId===folder.id){ closeFolderPopup(); }
        else { openFolderPopup(folder, ftab); }
      });
      ftab.addEventListener('contextmenu', e=>{
        e.preventDefault(); e.stopPropagation();
        showFolderCtxMenu(e.clientX, e.clientY, folder);
      });

      // 드래그로 폴더 위치 이동
      let dragStartX = 0, isDragging = false;
      ftab.addEventListener('mousedown', e=>{
        if(e.button !== 0) return;
        ftab.style.cursor = 'grabbing';
        dragStartX = e.clientX; isDragging = false;
        const onMove = ev=>{
          if(Math.abs(ev.clientX - dragStartX) > 6) isDragging = true;
          if(!isDragging) return;
          ftab.style.opacity = '0.5';
          // 폴더를 다른 탭/폴더 위치로 이동
          const allTabs = [...document.querySelectorAll('.map-tab,.folder-tab')];
          const targetEl = allTabs.find(t=>{
            if(t===ftab) return false;
            const r=t.getBoundingClientRect();
            return ev.clientX>=r.left && ev.clientX<=r.right;
          });
          if(targetEl){
            const targetMapId = +targetEl.dataset.mapId;
            const targetFolderId = +targetEl.dataset.folderId;
            // 폴더의 첫 번째 mapId 기준으로 위치 조정
            const firstMapId = folder.mapIds[0];
            const fromIdx = maps.findIndex(x=>x.id===firstMapId);
            let toIdx = -1;
            if(targetMapId) toIdx = maps.findIndex(x=>x.id===targetMapId);
            else if(targetFolderId){
              const tf = folders.find(f=>f.id===targetFolderId);
              if(tf) toIdx = maps.findIndex(x=>x.id===tf.mapIds[0]);
            }
            if(fromIdx!==-1 && toIdx!==-1 && fromIdx!==toIdx){
              // 폴더의 모든 맵을 새 위치로 이동
              const folderMaps = folder.mapIds.map(id=>maps.find(m=>m.id===id)).filter(Boolean);
              maps = maps.filter(m=>!folder.mapIds.includes(m.id));
              const newToIdx = Math.min(toIdx, maps.length);
              maps.splice(newToIdx, 0, ...folderMaps);
              renderMapTabs();
            }
          }
        };
        const onUp = ()=>{
          ftab.style.cursor=''; ftab.style.opacity=''; isDragging=false;
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          saveMapTabs();
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
      bar.insertBefore(ftab, addBtn);
    } else if(!folder){
      // 단독 맵 탭
      const tab = makeMapTab(m);
      bar.insertBefore(tab, addBtn);
    }
  });

  const activeTab = bar.querySelector('.map-tab.active');
  if(activeTab) activeTab.scrollIntoView({block:'nearest',inline:'nearest'});
  // 열린 폴더 팝업 위치 갱신
  if(openFolderId){
    const folder = folders.find(f=>f.id===openFolderId);
    const ftab = bar.querySelector(`.folder-tab[data-folder-id="${openFolderId}"]`);
    if(folder && ftab) openFolderPopup(folder, ftab);
    else closeFolderPopup();
  }
  saveMapTabs();
}

function makeMapTab(m){
  const tab = document.createElement('div');
  tab.className = 'map-tab' + (m.id===activeMapId?' active':'');
  tab.dataset.mapId = m.id;
  tab.innerHTML = `<span class="tab-name" title="${m.name}">${m.name}</span>`;

  tab.addEventListener('click', e=>{
    if(m.id === activeMapId) return;
    saveCurrentToMap(); activeMapId = m.id; loadMapData(m);
    renderMapTabs(); updateTransform(); render();
  });
  tab.addEventListener('contextmenu', e=>{
    e.preventDefault(); e.stopPropagation();
    showTabCtxMenu(e.clientX, e.clientY, m);
  });

  let dragStartX = 0, isDragging = false;
  tab.addEventListener('mousedown', e=>{
    if(e.button !== 0) return;
    tab.style.cursor = 'grabbing'; dragStartX = e.clientX; isDragging = false;
    const onMove = ev=>{
      if(Math.abs(ev.clientX - dragStartX) > 6) isDragging = true;
      if(!isDragging) return;
      tab.style.opacity = '0.5';
      const tabs = [...document.querySelectorAll('.map-tab')];
      const targetTab = tabs.find(t=>{ if(t===tab) return false; const r=t.getBoundingClientRect(); return ev.clientX>=r.left&&ev.clientX<=r.right; });
      if(targetTab){
        const targetId = +targetTab.dataset.mapId;
        const fromIdx = maps.findIndex(x=>x.id===m.id);
        const toIdx = maps.findIndex(x=>x.id===targetId);
        if(fromIdx!==-1&&toIdx!==-1){ const [moved]=maps.splice(fromIdx,1); maps.splice(toIdx,0,moved); renderMapTabs(); }
      }
    };
    const onUp = ()=>{ tab.style.cursor=''; tab.style.opacity=''; isDragging=false; document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); saveMapTabs(); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  return tab;
}

function openFolderPopup(folder, ftabEl){
  openFolderId = folder.id;
  const popup = document.getElementById('folder-popup');
  popup.innerHTML = '';

  folder.mapIds.forEach(mid=>{
    const m = maps.find(x=>x.id===mid); if(!m) return;
    const item = document.createElement('div');
    item.className = 'fp-item' + (m.id===activeMapId?' active':'');
    item.dataset.mapId = m.id;
    item.innerHTML = `<span>${m.id===activeMapId?'▶':''}</span><span>${m.name}</span>`;
    item.addEventListener('click', e=>{
      e.stopPropagation();
      if(m.id===activeMapId){ closeFolderPopup(); return; }
      saveCurrentToMap(); activeMapId=m.id; loadMapData(m);
      closeFolderPopup(); renderMapTabs(); updateTransform(); render();
    });
    item.addEventListener('contextmenu', e=>{ e.preventDefault(); e.stopPropagation(); showTabCtxMenu(e.clientX, e.clientY, m); });
    popup.appendChild(item);
  });

  // 위치 계산
  const rect = ftabEl.getBoundingClientRect();
  popup.style.left = rect.left + 'px';
  popup.classList.add('show');

  // 폴더 탭 화살표 갱신
  document.querySelectorAll('.folder-tab').forEach(ft=>{
    if(+ft.dataset.folderId===folder.id){
      ft.classList.add('open');
      // 화살표 텍스트 업데이트
      const arrow = ft.querySelector('span:last-child');
      if(arrow) arrow.textContent = '▼';
    } else {
      ft.classList.remove('open');
      const arrow = ft.querySelector('span:last-child');
      if(arrow) arrow.textContent = '▲';
    }
  });

  // 외부 클릭 시 닫기
  const outsideClick = e=>{
    const popup = document.getElementById('folder-popup');
    const bar = document.getElementById('map-tab-bar');
    if(!popup.contains(e.target) && !bar.contains(e.target)){
      closeFolderPopup();
      document.removeEventListener('click', outsideClick);
    }
  };
  setTimeout(()=>{ document.addEventListener('click', outsideClick); }, 50);
}

function closeFolderPopup(){
  openFolderId = null;
  const popup = document.getElementById('folder-popup');
  popup.classList.remove('show');
  document.querySelectorAll('.folder-tab').forEach(ft=>{
    ft.classList.remove('open');
    const arrow = ft.querySelector('span:last-child');
    if(arrow) arrow.textContent = '▲';
  });
}

function showFolderCtxMenu(x, y, folder){
  document.getElementById('tab-ctx-menu')?.remove();
  const menu = document.createElement('div');
  menu.id = 'tab-ctx-menu';
  menu.style.cssText=`position:fixed;left:${Math.min(x,window.innerWidth-200)}px;top:${Math.min(y,window.innerHeight-220)}px;background:#222;border:1px solid #555;border-radius:8px;padding:4px 0;z-index:99999;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.7);`;

  // 색상 팔레트
  const colors = ['#f0c040','#4aff7a','#4ab8ff','#c4b5fd','#ff8a65','#f48fb1','#80cbc4','#ffffff'];
  const colorRow = document.createElement('div');
  colorRow.style.cssText='display:flex;gap:6px;padding:8px 14px;flex-wrap:wrap;';
  colors.forEach(c=>{
    const dot = document.createElement('div');
    dot.style.cssText=`width:18px;height:18px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${folder.color===c?'#fff':'transparent'};flex-shrink:0;`;
    dot.addEventListener('click', ()=>{ folder.color=c; menu.remove(); renderMapTabs(); saveMapTabs(); });
    colorRow.appendChild(dot);
  });
  menu.appendChild(colorRow);

  const sep0 = document.createElement('div'); sep0.style.cssText='height:1px;background:#444;margin:2px 0;'; menu.appendChild(sep0);

  const items = [
    {label:'✏️ 폴더 이름 변경', action:()=>startRenameFolder(folder)},
    {sep:true},
    {label:'🗑 폴더 해제 (맵은 유지)', danger:true, action:()=>{ folders=folders.filter(f=>f.id!==folder.id); closeFolderPopup(); renderMapTabs(); saveMapTabs(); }},
    {sep:true},
    {label:'✕ 닫기', action:()=>{}},
  ];
  items.forEach(item=>{
    if(item.sep){ const s=document.createElement('div'); s.style.cssText='height:1px;background:#444;margin:3px 0;'; menu.appendChild(s); return; }
    const div=document.createElement('div');
    div.textContent=item.label;
    div.style.cssText=`padding:8px 16px;font-size:12px;cursor:pointer;color:${item.danger?'#f99':'#ddd'};`;
    div.addEventListener('mouseenter',()=>div.style.background='#333');
    div.addEventListener('mouseleave',()=>div.style.background='');
    div.addEventListener('click',()=>{ menu.remove(); item.action(); });
    menu.appendChild(div);
  });
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click', ()=>menu.remove(), {once:true}), 10);
}

function startRenameFolder(folder){
  const ftab = document.querySelector(`.folder-tab[data-folder-id="${folder.id}"] .tab-name`);
  if(!ftab) return;
  const old = folder.name;
  const inp = document.createElement('input');
  inp.value = old;
  inp.style.cssText='background:#222;border:1px solid #f0c040;color:#fff;font-size:12px;font-family:inherit;padding:1px 5px;border-radius:3px;width:90px;outline:none;';
  ftab.replaceWith(inp); inp.focus(); inp.select();
  const finish=()=>{ folder.name=inp.value.trim()||old; renderMapTabs(); saveMapTabs(); };
  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', ev=>{ if(ev.key==='Enter') inp.blur(); if(ev.key==='Escape'){inp.value=old; inp.blur();} ev.stopPropagation(); });
}

// 맵을 폴더로 묶기
function createFolderFromMaps(mapIds, folderName){
  const folder = {id: folderIdCounter++, name: folderName, mapIds: [...mapIds]};
  folders.push(folder);
  renderMapTabs(); saveMapTabs();
  return folder;
}

function showTabCtxMenu(x, y, m){
  document.getElementById('tab-ctx-menu')?.remove();
  const menu = document.createElement('div');
  menu.id = 'tab-ctx-menu';
  menu.style.cssText=`position:fixed;left:${Math.min(x,window.innerWidth-200)}px;top:${Math.min(y,window.innerHeight-200)}px;background:#222;border:1px solid #555;border-radius:8px;padding:4px 0;z-index:99999;min-width:170px;box-shadow:0 8px 24px rgba(0,0,0,0.7);`;

  // 기존 폴더 목록 (이 맵을 넣을 수 있는)
  const myFolder = folders.find(f=>f.mapIds.includes(m.id));
  const folderItems = folders.filter(f=>f.id !== myFolder?.id).map(f=>({
    label:`"${f.name}"에 넣기`, folderColor: f.color||'#f0c040',
    action:()=>{ f.mapIds.push(m.id); if(myFolder) myFolder.mapIds=myFolder.mapIds.filter(id=>id!==m.id); renderMapTabs(); saveMapTabs(); }
  }));

  const items = [
    {label:'✏️ 이름 변경', action:()=>startRenameTab(m)},
    {label:'➕ 새 맵 추가', action:()=>addMapTab()},
    {sep:true},
    {label:'📁 새 폴더 만들기', action:()=>{
      const name = prompt('폴더 이름:','새 폴더');
      if(!name) return;
      if(myFolder) myFolder.mapIds=myFolder.mapIds.filter(id=>id!==m.id);
      createFolderFromMaps([m.id], name);
    }},
    ...folderItems,
    ...(myFolder ? [{label:`📤 폴더에서 꺼내기`, action:()=>{ myFolder.mapIds=myFolder.mapIds.filter(id=>id!==m.id); if(!myFolder.mapIds.length) folders=folders.filter(f=>f.id!==myFolder.id); renderMapTabs(); saveMapTabs(); }}] : []),
    {sep:true},
    {label:'🗑 이 맵 닫기', danger:true, action:()=>closeMapTab(m)},
    {label:'✕ 다른 맵 모두 닫기', danger:true, action:()=>closeOtherTabs(m)},
  ];
  items.forEach(item=>{
    if(item.sep){ const s=document.createElement('div'); s.style.cssText='height:1px;background:#444;margin:3px 0;'; menu.appendChild(s); return; }
    const div=document.createElement('div');
    const color = item.danger ? '#f99' : item.folderColor ? item.folderColor : item.label.startsWith('📁')||item.label.startsWith('📤') ? '#f0c040' : '#ddd';
    div.style.cssText=`padding:8px 16px;font-size:12px;cursor:pointer;color:${color};display:flex;align-items:center;gap:7px;`;
    if(item.folderColor){
      const fc = item.folderColor;
      div.innerHTML = `<svg width="15" height="13" viewBox="0 0 16 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 2.5C1 1.67 1.67 1 2.5 1H6L7.5 3H13.5C14.33 3 15 3.67 15 4.5V11.5C15 12.33 14.33 13 13.5 13H2.5C1.67 13 1 12.33 1 11.5V2.5Z" fill="${fc}" fill-opacity="0.85" stroke="${fc}" stroke-width="1"/></svg><span>${item.label}</span>`;
    } else {
      div.textContent = item.label;
    }
    div.addEventListener('mouseenter',()=>div.style.background='#333');
    div.addEventListener('mouseleave',()=>div.style.background='');
    div.addEventListener('click',()=>{ menu.remove(); item.action(); });
    menu.appendChild(div);
  });
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click', ()=>menu.remove(), {once:true}), 10);
}

function startRenameTab(m){
  const old = m.name;

  // 폴더 안의 맵이면 prompt로 처리 (팝업이 닫혀있어서 인라인 편집 불가)
  const inFolder = folders.some(f=>f.mapIds.includes(m.id));
  if(inFolder){
    const newName = prompt('맵 이름 변경:', old);
    if(newName && newName.trim()){ m.name=newName.trim(); renderMapTabs(); saveMapTabs(); }
    return;
  }

  const tab = document.querySelector(`.map-tab[data-map-id="${m.id}"] .tab-name`);
  if(!tab) return;

  const inp = document.createElement('input');
  inp.value = old;
  inp.style.cssText='background:#222;border:1px solid #4a9;color:#fff;font-size:12px;font-family:inherit;padding:1px 5px;border-radius:3px;width:120px;outline:none;';
  tab.replaceWith(inp); inp.focus(); inp.select();
  const finish=()=>{ const v=inp.value.trim()||old; m.name=v; renderMapTabs(); saveMapTabs(); };
  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', ev=>{ if(ev.key==='Enter') inp.blur(); if(ev.key==='Escape'){inp.value=old; inp.blur();} ev.stopPropagation(); });
}

function closeMapTab(m){
  const idx = maps.findIndex(x=>x.id===m.id);
  if(maps.length <= 1){
    const fresh = createMapData('맵 1');
    maps=[fresh]; activeMapId=fresh.id; loadMapData(fresh);
    renderMapTabs(); fitView(); render(); saveMapTabs(); return;
  }
  maps.splice(idx, 1);
  if(activeMapId===m.id){ const next=maps[Math.min(idx,maps.length-1)]; activeMapId=next.id; loadMapData(next); }
  renderMapTabs(); updateTransform(); render(); saveMapTabs();
}

function closeOtherTabs(m){
  if(maps.length<=1) return;
  maps = maps.filter(x=>x.id===m.id);
  activeMapId=m.id; loadMapData(m);
  renderMapTabs(); updateTransform(); render(); saveMapTabs();
}

function addMapTab(name){
  saveCurrentToMap();
  const m = createMapData(name || `맵 ${maps.length+1}`);
  maps.push(m);
  activeMapId = m.id;
  loadMapData(m);
  renderMapTabs();
  fitView(); render();
  // 새 탭 이름 바로 편집
  setTimeout(()=>{
    const bar = document.getElementById('map-tab-bar');
    const tab = bar.querySelector('.map-tab.active .tab-name');
    if(tab) tab.dispatchEvent(new MouseEvent('dblclick',{bubbles:true}));
  }, 80);
}

function saveMapTabs(){
  try {
    localStorage.setItem('mindmap_maps', JSON.stringify({
      maps: maps.map(m=>({...m, nodes: m.id===activeMapId ? JSON.parse(JSON.stringify(nodes)) : m.nodes})),
      activeMapId, mapIdCounter,
      nextId: nextId,
      folders, folderIdCounter
    }));
  } catch(e){}
}

// ── 자동저장 & 초기화 ─────────────────────────────────────
setInterval(()=>{ saveCurrentToMap(); saveMapTabs(); }, 15000);

// 초기 로드
(function(){
  try {
    const s = localStorage.getItem('mindmap_maps');
    if(s){
      const d = JSON.parse(s);
      if(d.maps?.length){
        maps = d.maps;
        mapIdCounter = d.mapIdCounter || maps.length+1;
        activeMapId = d.activeMapId || maps[0].id;
        if(d.folders) { folders = d.folders; folderIdCounter = d.folderIdCounter || folders.length+1; }
        const active = maps.find(m=>m.id===activeMapId) || maps[0];
        loadMapData(active);
        setTimeout(()=>{ renderMapTabs(); fitView(); render(); }, 80);
        return;
      }
    }
  } catch(e){}
  // 기본 첫 맵
  const first = createMapData('맵 1');
  first.nodes = [Object.assign(defNode(1,'중심 주제',null,600,320,'#1f5c3f'),{borderColor:'rgba(255,255,255,0.5)',borderWidth:2,fontSize:14,fontBold:true})];
  first.nextId = 2;
  maps = [first];
  activeMapId = first.id;
  loadMapData(first);
  setTimeout(()=>{ renderMapTabs(); fitView(); render(); }, 80);
})();
</script>
